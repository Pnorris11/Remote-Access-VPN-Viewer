server {
    listen 80;
    server_name hq-mo-u24-fmcui.bandwidth.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hq-mo-u24-fmcui.bandwidth.local;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/ravpn.crt;
    ssl_certificate_key /etc/ssl/private/ravpn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/ravpn_access.log;
    error_log /var/log/nginx/ravpn_error.log;

    # Proxy to Flask app
    location / {
        proxy_pass http://web:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Static files (if any)
    location /static {
        alias /Users/cburton/Documents/GitHub/CorpIT-Network/ravpn/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
